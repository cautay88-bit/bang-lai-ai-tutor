<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bae6fd"/>
      <stop offset="45%" stop-color="#e0f2fe"/>
      <stop offset="100%" stop-color="#f0f9ff"/>
    </linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
  </defs>
  <rect width="1440" height="900" fill="url(#sky)"/>
  <!-- Clouds -->
  <ellipse cx="200" cy="120" rx="90" ry="35" fill="#fff" opacity="0.85"/>
  <ellipse cx="260" cy="110" rx="70" ry="28" fill="#fff" opacity="0.9"/>
  <ellipse cx="1100" cy="90" rx="100" ry="38" fill="#fff" opacity="0.8"/>
  <ellipse cx="1180" cy="100" rx="60" ry="25" fill="#fff" opacity="0.85"/>
  <ellipse cx="700" cy="70" rx="80" ry="30" fill="#fff" opacity="0.6"/>
  <!-- Hills -->
  <path d="M0 520 Q360 420 720 480 T1440 440 L1440 900 L0 900 Z" fill="#86efac" opacity="0.35"/>
  <path d="M0 580 Q400 500 800 560 T1440 520 L1440 900 L0 900 Z" fill="#4ade80" opacity="0.2"/>
  <!-- Road -->
  <path d="M0 680 L1440 680 L1440 900 L0 900 Z" fill="url(#road)" opacity="0.15"/>
  <rect x="0" y="720" width="1440" height="180" fill="url(#road)" opacity="0.25"/>
  <rect x="0" y="795" width="1440" height="6" fill="#fbbf24" opacity="0.5"/>
  <rect x="0" y="808" width="1440" height="4" fill="#fff" opacity="0.6"/>
  <!-- Car 1 - blue sedan -->
  <g transform="translate(180, 730)" opacity="0.55">
    <rect x="0" y="20" width="120" height="40" rx="8" fill="#2563eb"/>
    <path d="M25 20 L40 0 L85 0 L100 20 Z" fill="#3b82f6"/>
    <rect x="42" y="4" width="18" height="14" rx="2" fill="#bfdbfe" opacity="0.9"/>
    <rect x="68" y="4" width="18" height="14" rx="2" fill="#bfdbfe" opacity="0.9"/>
    <circle cx="28" cy="62" r="14" fill="#1e293b"/><circle cx="28" cy="62" r="7" fill="#94a3b8"/>
    <circle cx="92" cy="62" r="14" fill="#1e293b"/><circle cx="92" cy="62" r="7" fill="#94a3b8"/>
  </g>
  <!-- Car 2 - smaller, far -->
  <g transform="translate(950, 750) scale(0.75)" opacity="0.4">
    <rect x="0" y="20" width="120" height="40" rx="8" fill="#0891b2"/>
    <path d="M25 20 L40 0 L85 0 L100 20 Z" fill="#06b6d4"/>
    <circle cx="28" cy="62" r="14" fill="#1e293b"/><circle cx="92" cy="62" r="14" fill="#1e293b"/>
  </g>
  <!-- Traffic sign -->
  <g transform="translate(1280, 640)" opacity="0.45">
    <rect x="58" y="80" width="8" height="100" fill="#64748b"/>
    <polygon points="62,20 95,55 29,55" fill="#fff" stroke="#dc2626" stroke-width="4"/>
    <rect x="42" y="38" width="40" height="12" fill="#dc2626"/>
  </g>
  <!-- Steering wheel icon decorative -->
  <g transform="translate(120, 200)" opacity="0.12">
    <circle cx="60" cy="60" r="55" fill="none" stroke="#0369a1" stroke-width="8"/>
    <circle cx="60" cy="60" r="18" fill="#0369a1"/>
    <line x1="60" y1="5" x2="60" y2="35" stroke="#0369a1" stroke-width="6"/>
    <line x1="60" y1="85" x2="60" y2="115" stroke="#0369a1" stroke-width="6"/>
    <line x1="5" y1="60" x2="35" y2="60" stroke="#0369a1" stroke-width="6"/>
    <line x1="85" y1="60" x2="115" y2="60" stroke="#0369a1" stroke-width="6"/>
  </g>
  <!-- License plate B2 -->
  <g transform="translate(1050, 180)" opacity="0.15">
    <rect x="0" y="0" width="140" height="70" rx="6" fill="#fff" stroke="#0369a1" stroke-width="4"/>
    <text x="70" y="48" fill="#0369a1" font-size="36" font-family="Arial,sans-serif" font-weight="bold" text-anchor="middle">B2</text>
  </g>
</svg>
